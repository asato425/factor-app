name: Dev Start Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  dev-start:
    runs-on: ubuntu-latest
    env:
      DEV_SERVER_PORT: 3000
      STARTUP_TIMEOUT_SECONDS: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm run dev starts
        run: |
          npm run dev > /tmp/dev.log 2>&1 &
          dev_pid=$!
          trap 'kill "$dev_pid" 2>/dev/null || true; wait "$dev_pid" 2>/dev/null || true' EXIT

          for _ in $(seq 1 "$STARTUP_TIMEOUT_SECONDS"); do
            if curl -fsS "http://127.0.0.1:${DEV_SERVER_PORT}" > /dev/null; then
              exit 0
            fi
            if ! kill -0 "$dev_pid" 2>/dev/null; then
              cat /tmp/dev.log
              exit 1
            fi
            echo "Waiting for dev server on port ${DEV_SERVER_PORT}..."
            sleep 1
          done

          echo "Dev server did not become ready in time."
          cat /tmp/dev.log
          exit 1
